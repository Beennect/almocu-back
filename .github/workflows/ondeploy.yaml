name: CI — Monorepo Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    # Serviços auxiliares (Equivalente ao docker-compose)
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      MONGODB_URI: mongodb://localhost:27017/almoco_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: super-secret-key-123

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build All Apps
        run: npm run build:all

      - name: Run Monorepo Tests
        run: npm test

      - name: Docker Compose Build Check
        # Isso garante que o Dockerfile continua funcionando
        run: docker compose build
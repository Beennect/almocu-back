name: CI — Monorepo Tests

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']

# Cancela runs anteriores se houver novo push na mesma branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MONGODB_URI: mongodb://localhost:27017/almoco_test
  REDIS_URI: redis://localhost:6379
  JWT_SECRET: ci-secret-key-do-not-use-in-production
  INTERNAL_API_KEY: ci-internal-key
  GOOGLE_CLIENT_ID: ci-dummy-id
  GOOGLE_CLIENT_SECRET: ci-dummy-secret
  GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
  STRIPE_SECRET_KEY: sk_test_ci_dummy
  NODE_ENV: test

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: deps-${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            deps-${{ runner.os }}-bun-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build all apps
        run: |
          bun run build:auth &
          bun run build:menu &
          bun run build:stock &
          bun run build:order &
          wait
        shell: bash

      - name: Run unit tests
        run: bun run test

      - name: Run e2e tests
        run: bun run test:e2e
        env:
          MONGODB_URI: mongodb://localhost:27017/almoco_test
        continue-on-error: true

  docker-check:
    name: Docker build check
    runs-on: ubuntu-latest
    # Só roda se o Dockerfile mudou
    if: |
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.message, 'docker') ||
      contains(github.event.head_commit.message, 'Dockerfile')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images (cache)
        run: |
          docker compose build --parallel

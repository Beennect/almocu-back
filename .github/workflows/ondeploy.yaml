name: CI — Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix modules/menu
          npm ci --prefix modules/stock
          npm ci --prefix modules/order

      - name: Run build
        run: npm run build:all

      - name: Run tests
        run: npm run test:all
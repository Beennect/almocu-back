name: CI — Monorepo Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    # Serviços auxiliares (Equivalente ao docker-compose)
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      MONGODB_URI: mongodb://localhost:27017/almoco_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_URI: redis://localhost:6379
      JWT_SECRET: super-secret-key-123

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build All Apps
        run: bun run build:all

      - name: Run Unit Tests
        run: bun run test

      - name: Run E2E Tests
        run: bun run test:e2e

      - name: Docker Compose Build Check
        # Isso garante que o Dockerfile continua funcionando com o Bun
        run: docker compose build
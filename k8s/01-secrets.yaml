# ─────────────────────────────────────────────────────────────────
# Secret — Variáveis sensíveis (equivalente às secrets do .env)
# Os valores DEVEM ser codificados em base64.
#
# Para gerar: echo -n "seu_valor" | base64
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: almocu-secrets
  namespace: almocu
type: Opaque
stringData:
  # ⚠️ Troque pelos valores reais antes de aplicar em produção
  JWT_SECRET: "sua_chave_secreta_aqui_muito_longa_e_segura_123"
  GOOGLE_CLIENT_ID: "seu_google_client_id_aqui"
  GOOGLE_CLIENT_SECRET: "seu_google_client_secret_aqui"
  INTERNAL_API_KEY: "sua_chave_interna_aqui"
  STRIPE_SECRET_KEY: "sk_test_sua_chave_stripe_aqui"

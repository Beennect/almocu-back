stages:
  - test
  - build

variables:
  # Configurações para os testes (ajuste se necessário)
  MONGODB_URI: "mongodb://mongodb:27017/almoco_test"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  JWT_SECRET: "ci-test-secret-123"

test-monorepo:
  stage: test
  image: node:20
  services:
    - name: mongo:6
      alias: mongodb
    - name: redis:7
      alias: redis
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci
  script:
    - echo "Rodando todos os testes do monorepo..."
    - npm run test
  artifacts:
    when: always
    paths:
      - coverage/
    expire_in: 1 week

build-images:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY || true
  script:
    - echo "Fazendo build das imagens..."
    - docker compose build || docker-compose build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

services:
  auth-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth_app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:55433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data:Z
    networks:
      - almoco_network

  auth-app:
    build: .
    ports:
      - "3000:3000"
    # VOLUME REMOVIDO PARA EVITAR EACCES NO FEDORA
    environment:
      - NODE_ENV=development
      - JWT_SECRET=super-secret-key-123
      - DATABASE_URL=postgresql://postgres:postgres@auth-db:5432/auth_app
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - almoco_network

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - almoco_network

  redis:
    image: redis:alpine
    ports:
      - "127.0.0.1:63790:6379"
    networks:
      - almoco_network

  stock-app:
    build: ./modules/stock
    volumes:
      - ./modules/stock:/app:Z
      - /app/node_modules
    environment:
      - PORT=3000
      - JWT_SECRET=super-secret-key-123
      - MONGODB_URI=mongodb://mongodb:27017/almocu_stock
      - NODE_ENV=development
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "3100:3000"
    command: ["npm", "run", "dev"]
    networks:
      - almoco_network

  menu-app:
    build: ./modules/menu
    volumes:
      - ./modules/menu:/app:Z
      - /app/node_modules
    ports:
      - "3200:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=super-secret-key-123
      - MONGODB_URI=mongodb://mongodb:27017/almocu
      - REDIS_URI=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      - mongodb
      - redis
    command: ["npm", "run", "dev"]
    networks:
      - almoco_network

  order-app:
    build: ./modules/order
    volumes:
      - ./modules/order:/app:Z
      - /app/node_modules
    depends_on:
      - mongodb
    ports:
      - "3300:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=super-secret-key-123
      - MONGODB_URI=mongodb://mongodb:27017/almocu_order
      - NODE_ENV=development
    networks:
      - almoco_network
    command: ["npm", "run", "dev"]

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    ports:
      - "19999:19999"
    restart: always
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - almoco_network

networks:
  almoco_network:
    driver: bridge

volumes:
  auth_postgres_data:
  mongo_data:

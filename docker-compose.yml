services:
  auth-app:
    build: .
    ports:
      - "3000:3000"
    # VOLUME REMOVIDO PARA EVITAR EACCES NO FEDORA
    environment:
      - NODE_ENV=development
      - JWT_SECRET=super-secret-key-123
      - MONGODB_URI=mongodb://mongodb:27017/auth_app
      - REDIS_URI=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - almoco_network

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - almoco_network

  redis:
    image: redis:alpine
    ports:
      - "127.0.0.1:63790:6379"
    networks:
      - almoco_network

  stock-app:
    build: ./modules/stock
    volumes:
      - ./modules/stock/src:/app/src:Z
      - ./modules/stock/package.json:/app/package.json:Z
      - ./modules/stock/tsconfig.json:/app/tsconfig.json:Z
      - ./modules/stock/nest-cli.json:/app/nest-cli.json:Z
      - /app/node_modules
    environment:
      - PORT=3000
      - JWT_SECRET=super-secret-key-123
      - MONGODB_URI=mongodb://mongodb:27017/almocu_stock
      - NODE_ENV=development
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "3100:3000"
    command: ["npm", "run", "start:dev"]
    networks:
      - almoco_network

  menu-app:
    build: ./modules/menu
    volumes:
      - ./modules/menu/src:/app/src:Z
      - ./modules/menu/package.json:/app/package.json:Z
      - ./modules/menu/tsconfig.json:/app/tsconfig.json:Z
      - ./modules/menu/nest-cli.json:/app/nest-cli.json:Z
      - /app/node_modules
    ports:
      - "3200:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=super-secret-key-123
      - MONGODB_URI=mongodb://mongodb:27017/almocu
      - REDIS_URI=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      - mongodb
      - redis
    command: ["npm", "run", "start:dev"]
    networks:
      - almoco_network

  order-app:
    build: ./modules/order
    volumes:
      - ./modules/order/src:/app/src:Z
      - ./modules/order/package.json:/app/package.json:Z
      - ./modules/order/tsconfig.json:/app/tsconfig.json:Z
      - ./modules/order/nest-cli.json:/app/nest-cli.json:Z
      - ./modules/order/test:/app/test:Z
    depends_on:
      - mongodb
    ports:
      - "3300:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=super-secret-key-123
      - MONGODB_URI=mongodb://mongodb:27017/almocu_order
      - NODE_ENV=development
    networks:
      - almoco_network
    command: ["npm", "run", "start:dev"]


networks:
  almoco_network:
    driver: bridge

volumes:
  mongo_data:

services:
  auth-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth_app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:55433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data:Z
    networks:
      - almoco_network

  auth-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
      - DATABASE_URL=postgresql://postgres:postgres@auth-db:5432/auth_app
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - almoco_network

  # ----------------------------------------------------
  # SHARED DATABASES (STOCK & MENU)
  # ----------------------------------------------------
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - almoco_network

  redis:
    image: redis:alpine
    ports:
      - "127.0.0.1:63790:6379"
    networks:
      - almoco_network

  # ----------------------------------------------------
  # STOCK SERVICE
  # ----------------------------------------------------
  stock-app:
    build: ./modules/stock
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
      - MONGODB_URI=mongodb://mongodb:27017/almocu_stock
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "3100:3000"
    command: ["npm", "start"]
    networks:
      - almoco_network

  # ----------------------------------------------------
  # MENU SERVICE
  # ----------------------------------------------------
  menu-app:
    # Uses the cloned module directory
    build: ./modules/menu
    ports:
      - "3200:3000" # Mapped to 3200 to avoid conflict with auth-app (3000)
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
      - MONGODB_URI=mongodb://mongodb:27017/almocu
      - REDIS_URI=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - almoco_network

  # ----------------------------------------------------
  # ORDER SERVICE
  # ----------------------------------------------------
  order-app:
    build: ./modules/order
    depends_on:
      - mongodb
    ports:
      - "3300:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
      - MONGODB_URI=mongodb://mongodb:27017/almocu_order
      - NODE_ENV=development
    networks:
      - almoco_network

networks:
  almoco_network:
    driver: bridge

volumes:
  auth_postgres_data:
  mongo_data:

services:
  # ─────────────────────────────────────────────
  # Auth Service — port 3000
  # ─────────────────────────────────────────────
  auth-app:
    build:
      context: .
      target: production
      args:
        APP_NAME: auth
    image: almoco/auth:latest
    ports:
      - "${AUTH_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/auth_app}
      - REDIS_URI=${REDIS_URI:-redis://redis:6379}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - almoco_network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Menu Service — port 3200
  # ─────────────────────────────────────────────
  menu-app:
    build:
      context: .
      target: production
      args:
        APP_NAME: menu
    image: almoco/menu:latest
    ports:
      - "${MENU_PORT:-3200}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/almocu}
      - REDIS_URI=${REDIS_URI:-redis://redis:6379}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - almoco_network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Stock Service — port 3100
  # ─────────────────────────────────────────────
  stock-app:
    build:
      context: .
      target: production
      args:
        APP_NAME: stock
    image: almoco/stock:latest
    ports:
      - "${STOCK_PORT:-3100}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/almocu_stock}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - almoco_network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Order Service — port 3300
  # ─────────────────────────────────────────────
  order-app:
    build:
      context: .
      target: production
      args:
        APP_NAME: order
    image: almoco/order:latest
    ports:
      - "${ORDER_PORT:-3300}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-123}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/almocu_order}
      - MENU_SERVICE_URL=${MENU_SERVICE_URL:-http://menu-app:3000}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - almoco_network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # MongoDB
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGO_PORT:-27018}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - almoco_network

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-63790}:6379"
    networks:
      - almoco_network

networks:
  almoco_network:
    driver: bridge

volumes:
  mongo_data:
